<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spanish or Inglish</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body{
            margin-top: 5rem;
        }

        #div-container{
            width: 400px;
            height: 500px;
            margin: 180px auto;
            padding: 2rem;
            border: solid 1px #000000;
            border-radius: 10%;
            background-color: #71a277;
        }

        #form-container{
            display: flex;
            flex-direction: column;
            max-width: 400px;

        }

        #input{
            margin-top: 2.5rem;
            background-color: #abaaaa;
        }

        label{
            margin-top: 1rem;
        }

        input{
            
            padding: 0.5rem;
            border: solid 1px #000000;
            border-radius: 5px;
        }

        textarea{
            padding: 0.5rem;
            border: solid 1px #000000;
            border-radius: 5px;
            height: 100px;
        }

    </style>
</head>
<body>
    <nav id="navbar" class="nav">
        <ul class="nav-list">
            <li><a href="#welcome-section" data-section="nav-list" data-value="welcome-section">Acerca</a></li>
            <li><a href="#projects" data-section="nav-list" data-value="projects">Servicios</a></li>
            <li><a href="#contact" data-section="nav-list" data-value="contact">Contactos</a></li>
        </ul>
        <div id="language-buttons" class="language-buttons">
            <button data-language="es">ES</button>
            <button data-language="en">EN</button>
        </div>
    </nav>
    
    <section id="form-section">
        <div id="div-container">
            <form id="form-container" action="https://formsubmit.co/debrahtraduc@gmail.com" method="POST">
                <label for="Nombre">Nombre</label>
                <input type="text" name="name">

                <label for="telefono">Telefono</label>
                <input type="text" name="phone">

                <label for="email">Email</label>
                <input type="text" name="email">

                <label for="comments">Comentarios</label>
                <textarea name="comments" cols="15" rows="5"></textarea>

                <input type="submit" value="Enviar" id="input">

                <input type="hidden" name="_next" value="https://spanishoringlish.com">

            </form>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
